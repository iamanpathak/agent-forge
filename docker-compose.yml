version: '3.8'

services:
  # The Relational Database for Users, Workspaces, and Agent Configurations
  postgres:
    image: postgres:15-alpine
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: agentforge_db
    volumes:
      - postgres_data:/var/lib/postgresql/data

  # The In-Memory Datastore for Background Job Queuing (BullMQ)
  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"

volumes:
  postgres_data:
    # This ensures your database data is not lost if the Docker container is stopped